<!DOCTYPE html>
<html>
<head>
<title>For Mariam 🤍</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(to right, #ffcccc, #ffe6e6);
  margin-top: 50px;
}
h1 {
  color: #ff4d6d;
}
button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  background-color: #ff4d6d;
  color: white;
  border-radius: 10px;
}
#msg {
  margin-top: 20px;
  font-size: 20px;
  color: #333;
}
</style>
</head>

<body>

<h1>To Mariam 🤍</h1>
<p>أنا عارف إني زعلتك… بس انتي مش شخص عادي عندي</p>

<button onclick="showMessage()">اضغطي هنا 🤍</button>

<p id="msg"></p>

<script>
function showMessage() {
  document.getElementById("msg").innerHTML =
  "أنا مش عايز أخسرك… وبتعلم أكون أحسن علشانك 🤍";
}
</script>

</body>
</html>
