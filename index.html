<!DOCTYPE html>
<html>
<head>
<title>For Rimzaaa 🤍</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(to right, #ffcccc, #ffe6e6);
  overflow: hidden;
}

h1 {
  color: #ff4d6d;
  margin-top: 40px;
}

p {
  font-size: 18px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 16px;
  border: none;
  background-color: #ff4d6d;
  color: white;
  border-radius: 10px;
}

#msg {
  margin-top: 20px;
  font-size: 20px;
  color: #333;
  min-height: 50px;
}

/* قلوب متحركة */
.heart {
  position: absolute;
  color: red;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>To Rimzaaaaa🤍</h1>
<p>أنا مش جاي أعتذر وخلاص… أنا جاي أصلّح 🤍</p>

<button onclick="msg1()">أنا غلطت</button>
<button onclick="msg2()">أنا حاسس بيكي</button>
<button onclick="msg3()">انتي مهمة عندي</button>
<button onclick="msg4()">أنا عايز أصلّح</button>

<p id="msg"></p>

<script>
function msg1() {
  document.getElementById("msg").innerHTML =
  "أنا فعلاً غلطت لما حسستك إنك لوحدك أو إن كلامك مش مهم… وحقك عليا بجد 🤍";
}

function msg2() {
  document.getElementById("msg").innerHTML =
  "أنا فهمت إنك كنتي محتاجة تحسي إني معاكي بجد مش بكلام… وأنا قصرت في ده 😔";
}

function msg3() {
  document.getElementById("msg").innerHTML =
  "انتي مش شخص عادي عندي… انتي حد أنا مش عايز أخسره مهما حصل 🤍";
}

function msg4() {
  document.getElementById("msg").innerHTML =
  "أنا مش هقولك هتغير وخلاص… أنا هخليكي تشوفي ده بنفسك… بس اديني فرصة 🤍";
}

/* قلوب */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 15 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
